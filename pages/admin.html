<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTX - Admin Dashboard</title>
    <link rel="icon" type="image/jpeg" href="../images/ARTX.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-shield-alt"></i>
                <span>ARTX Admin</span>
            </div>
            <nav class="admin-nav">
                <button class="admin-nav-btn active" data-view="overview">
                    <i class="fas fa-chart-line"></i> Overview
                </button>
                <button class="admin-nav-btn" data-view="challenges">
                    <i class="fas fa-trophy"></i> Challenges
                </button>
                <button class="admin-nav-btn" data-view="submissions">
                    <i class="fas fa-images"></i> Submissions
                </button>
                <button class="admin-nav-btn" data-view="users">
                    <i class="fas fa-users"></i> Users
                </button>
                <button class="admin-nav-btn" data-view="ugc">
                    <i class="fas fa-upload"></i> User Content
                </button>
            </nav>
            <div style="padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;">
                <button class="btn-secondary" onclick="window.location.href='../index.html'" style="width: 100%; margin-bottom: 10px;">
                    <i class="fas fa-home"></i> User Dashboard
                </button>
                <button class="btn-logout" onclick="adminLogout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Header -->
            <header class="admin-header">
                <h1 id="viewTitle">Dashboard Overview</h1>
                <div class="admin-user">
                    <span id="adminName">Admin</span>
                </div>
            </header>

            <!-- Overview View -->
            <section id="overview" class="admin-view active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                        <div class="stat-info">
                            <h3>Active Challenges</h3>
                            <div class="stat-value" id="activeChallenges">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-users"></i></div>
                        <div class="stat-info">
                            <h3>Total Users</h3>
                            <div class="stat-value" id="totalUsers">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-images"></i></div>
                        <div class="stat-info">
                            <h3>Total Submissions</h3>
                            <div class="stat-value" id="totalSubmissions">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-upload"></i></div>
                        <div class="stat-info">
                            <h3>User Content</h3>
                            <div class="stat-value" id="userContent">0</div>
                        </div>
                    </div>
                </div>

                <div class="recent-activity-admin">
                    <h2>Recent Activity</h2>
                    <div id="recentActivityList"></div>
                </div>
            </section>

            <!-- Challenges View -->
            <section id="challenges" class="admin-view">
                <div class="view-header">
                    <h2>Challenge Management</h2>
                    <button class="btn-primary" onclick="showCreateChallengeModal()">
                        <i class="fas fa-plus"></i> Create Challenge
                    </button>
                </div>

                <div class="challenges-list" id="challengesList"></div>
            </section>

            <!-- Submissions View -->
            <section id="submissions" class="admin-view">
                <h2>Challenge Submissions</h2>
                <div class="submissions-filter">
                    <select id="submissionFilter" onchange="filterSubmissions()">
                        <option value="all">All Challenges</option>
                    </select>
                </div>
                <div class="submissions-grid" id="submissionsGrid"></div>
            </section>

            <!-- Users View -->
            <section id="users" class="admin-view">
                <h2>User Management</h2>
                <div class="users-table" id="usersTable"></div>
            </section>

            <!-- User Generated Content View -->
            <section id="ugc" class="admin-view">
                <h2>User Generated Content</h2>
                <div class="ugc-filters">
                    <button class="filter-btn active" onclick="filterUGC('all')">All</button>
                    <button class="filter-btn" onclick="filterUGC('pending')">Pending Review</button>
                    <button class="filter-btn" onclick="filterUGC('approved')">Approved</button>
                    <button class="filter-btn" onclick="filterUGC('rejected')">Rejected</button>
                </div>
                <div class="ugc-grid" id="ugcGrid"></div>
            </section>
        </main>
    </div>

    <!-- Create Challenge Modal -->
    <div id="createChallengeModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeCreateChallengeModal()">&times;</span>
            <h2>Create New Challenge</h2>
            
            <form id="createChallengeForm" onsubmit="createChallenge(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Challenge Title</label>
                        <input type="text" id="challengeTitle" required placeholder="Enter challenge title">
                    </div>

                    <div class="form-group">
                        <label>Difficulty</label>
                        <select id="challengeDifficulty" required>
                            <option value="easy">Easy (10-30 pts)</option>
                            <option value="medium">Medium (30-60 pts)</option>
                            <option value="hard">Hard (60-100 pts)</option>
                            <option value="expert">Expert (100-200 pts)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Time Limit (minutes)</label>
                        <input type="number" id="challengeTimeLimit" required min="5" max="120" value="30">
                    </div>

                    <div class="form-group">
                        <label>Challenge Window (hours)</label>
                        <input type="number" id="challengeWindow" required min="1" max="168" value="24">
                    </div>

                    <div class="form-group full-width">
                        <label>Challenge Description</label>
                        <textarea id="challengeDescription" required rows="3" placeholder="Describe what users should interpret..."></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Image Prompt</label>
                        <input type="file" id="challengeImage" accept="image/*" onchange="previewChallengeImage(event)">
                        <div id="imagePreview" class="image-preview"></div>
                    </div>

                    <div class="form-group full-width">
                        <label>Submission Rules</label>
                        <textarea id="submissionRules" required rows="4" placeholder="Enter submission rules (one per line)..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Min Word Count</label>
                        <input type="number" id="minWordCount" value="50" min="10">
                    </div>

                    <div class="form-group">
                        <label>Max Word Count</label>
                        <input type="number" id="maxWordCount" value="500" min="50">
                    </div>

                    <div class="form-group full-width">
                        <label>Scoring Criteria</label>
                        <div class="scoring-criteria">
                            <div class="criteria-item">
                                <label>Creativity Weight (%)</label>
                                <input type="number" id="creativityWeight" value="40" min="0" max="100">
                            </div>
                            <div class="criteria-item">
                                <label>Relevance Weight (%)</label>
                                <input type="number" id="relevanceWeight" value="30" min="0" max="100">
                            </div>
                            <div class="criteria-item">
                                <label>Detail Weight (%)</label>
                                <input type="number" id="detailWeight" value="30" min="0" max="100">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-large">Create Challenge</button>
            </form>
        </div>
    </div>

    <!-- View Submission Modal -->
    <div id="viewSubmissionModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeViewSubmissionModal()">&times;</span>
            <div id="submissionDetails"></div>
        </div>
    </div>

    <script src="../scripts/admin.js"></script>
</body>
</html>
