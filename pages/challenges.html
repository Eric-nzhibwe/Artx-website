<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges</title>
    <link rel="icon" type="image/jpeg" href="../Images/ARTX.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/icon-nav.css">
    <link rel="stylesheet" href="../styles/challenges.css">
    <link rel="stylesheet" href="../styles/responsive-pro.css">
</head>
<body>
    <!-- Header with Bootstrap (matches index.html) -->
    <header class="header w-100">
        <div class="header-left d-flex align-items-center">
            <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer">
                <i class="fas fa-fire"></i>ARTX
            </div>
            <div class="search-bar d-none d-md-flex align-items-center">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search ARTX..." id="headerSearch">
            </div>
        </div>

        <nav class="icon-nav d-flex justify-content-center flex-grow-1">
            <button class="icon-nav-btn" title="Home" onclick="window.location.href='../index.html'">
                <i class="fas fa-home" style="color:black;"></i>
            </button>
            <button class="icon-nav-btn active" title="Challenges">
                <i class="fas fa-trophy" style="color:black;"></i>
            </button>
            <button class="icon-nav-btn" title="Community" onclick="window.location.href='community.html'">
                <i class="fas fa-users" style="color:black;"></i>
            </button>
            <button class="icon-nav-btn" title="Profile" onclick="window.location.href='user.html'">
                <i class="fas fa-user-circle" style="color:black;"></i>
            </button>
        </nav>

        <!-- Right Side Icons -->
        <div class="header-right d-flex align-items-center">
            <button class="header-icon-btn" onclick="window.location.href='../index.html'" title="Notifications">
                <i class="fas fa-bell" style="color:black;"></i>
            </button>
            <button class="header-icon-btn" onclick="toggleQuickMenu()" title="Menu">
                <i class="fas fa-th" style="color:black;"></i>
            </button>
            <div class="user-avatar-btn" onclick="toggleUserMenu()">
                <i class="fas fa-user-circle" style="color:black;"></i>
            </div>
        </div>

        <!-- Quick Menu Dropdown -->
        <div class="quick-menu-dropdown" id="quickMenuDropdown">
            <div class="quick-menu-header"><h3>Quick Access</h3></div>
            <div class="quick-menu-grid">
                <a href="../index.html" class="quick-menu-item">
                    <i class="fas fa-chart-line"></i><span>Dashboard</span>
                </a>
                <a href="challenges.html" class="quick-menu-item">
                    <i class="fas fa-trophy"></i><span>Challenges</span>
                </a>
                <a href="community.html" class="quick-menu-item">
                    <i class="fas fa-users"></i><span>Community</span>
                </a>
                <a href="wallet.html" class="quick-menu-item">
                    <i class="fas fa-wallet"></i><span>Wallet</span>
                </a>
                <a href="chatbot.html" class="quick-menu-item">
                    <i class="fas fa-robot"></i><span>AI Assistant</span>
                </a>
                <a href="influencers.html" class="quick-menu-item">
                    <i class="fas fa-star"></i><span>Influencers</span>
                </a>
            </div>
        </div>

        <!-- User Menu Dropdown -->
        <div class="user-menu-dropdown" id="userMenuDropdown">
            <div class="user-menu-header">
                <div class="user-menu-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="user-menu-info">
                    <h4 id="menuUsername">Player</h4>
                    <p id="menuTier">Bronze Tier</p>
                </div>
            </div>
            <div class="user-menu-stats">
                <div class="user-menu-stat">
                    <i class="fas fa-fire"></i>
                    <span id="menuStreak">0</span>
                </div>
                <div class="user-menu-stat">
                    <i class="fas fa-star"></i>
                    <span id="menuPrestige">0</span>
                </div>
                <div class="user-menu-stat">
                    <i class="fas fa-wallet"></i>
                    <span id="menuBalance">K0.00</span>
                </div>
            </div>
            <div class="user-menu-links">
                <a href="user.html">
                    <i class="fas fa-user"></i> View Profile
                </a>
                <a href="wallet.html">
                    <i class="fas fa-wallet"></i> My Wallet
                </a>
                <a href="#" onclick="window.location.href='../index.html'; return false;">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <a href="#" onclick="logout(); return false;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </header>

    <div class="container-fluid p-0 m-0">

        <!-- Challenges Grid -->
        <section class="challenges-section">
            <div class="section-header">
                <h1><i class="fas fa-trophy"></i> Active Challenges</h1>
                <div class="filters">
                    <button class="filter-btn active" onclick="filterChallenges('all')">All</button>
                    <button class="filter-btn" onclick="filterChallenges('easy')">Easy</button>
                    <button class="filter-btn" onclick="filterChallenges('medium')">Medium</button>
                    <button class="filter-btn" onclick="filterChallenges('hard')">Hard</button>
                    <button class="filter-btn" onclick="filterChallenges('expert')">Expert</button>
                </div>
            </div>

            <div class="challenges-grid" id="challengesGrid"></div>
        </section>

        <!-- My Submissions -->
        <section class="my-submissions">
            <h2><i class="fas fa-history"></i> My Submissions</h2>
            <div class="submissions-list" id="mySubmissionsList"></div>
        </section>
    </div>

    <!-- Challenge Modal -->
    <div id="challengeModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeChallengeModal()">&times;</span>
            <div id="challengeContent"></div>
        </div>
    </div>

    <!-- Upload Content Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUploadModal()">&times;</span>
            <h2><i class="fas fa-upload"></i> Create Challenge</h2>
            
            <div class="upload-tabs">
                <button class="tab-btn active" onclick="switchUploadTab('content')">Upload Content</button>
                <button class="tab-btn" onclick="switchUploadTab('challenge')">Create Challenge</button>
            </div>
            
            <!-- Upload Content Tab -->
            <div id="contentTab" class="tab-content active">
                <form id="uploadForm" onsubmit="uploadContent(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="uploadTitle" required placeholder="Give your content a title">
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="uploadDescription" required rows="3" placeholder="Describe your creation..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select id="uploadCategory" required>
                            <option value="art">Art</option>
                            <option value="photography">Photography</option>
                            <option value="digital">Digital Art</option>
                            <option value="abstract">Abstract</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Upload Image</label>
                        <input type="file" id="uploadImage" accept="image/*" required onchange="previewUploadImage(event)">
                        <div id="uploadPreview" class="image-preview"></div>
                    </div>

                    <button type="submit" class="btn-primary btn-large">Submit for Review</button>
                </form>
            </div>
            
            <!-- Create Challenge Tab -->
            <div id="challengeTab" class="tab-content">
                <form id="createChallengeForm" onsubmit="createChallenge(event)">
                    <div class="form-group">
                        <label>Challenge Title</label>
                        <input type="text" id="challengeTitle" required placeholder="e.g., The Forgotten Garden">
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="challengeDescription" required rows="3" placeholder="Describe what participants should interpret..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Difficulty</label>
                            <select id="challengeDifficulty" required>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                                <option value="expert">Expert</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Time Limit (minutes)</label>
                            <input type="number" id="challengeTimeLimit" required min="5" max="120" value="20">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Min Word Count</label>
                            <input type="number" id="challengeMinWords" required min="10" value="50">
                        </div>
                        <div class="form-group">
                            <label>Max Word Count</label>
                            <input type="number" id="challengeMaxWords" required min="50" value="200">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Submission Rules (one per line)</label>
                        <textarea id="challengeRules" required rows="4" placeholder="Rule 1&#10;Rule 2&#10;Rule 3"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Min Points</label>
                            <input type="number" id="challengeMinPoints" required min="5" value="10">
                        </div>
                        <div class="form-group">
                            <label>Max Points</label>
                            <input type="number" id="challengeMaxPoints" required min="10" value="50">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Scoring Weights (must sum to 100%)</label>
                        <div class="scoring-weights">
                            <div class="weight-input">
                                <label>Creativity %</label>
                                <input type="number" id="creativityWeight" required min="0" max="100" value="40" oninput="validateWeights()">
                            </div>
                            <div class="weight-input">
                                <label>Relevance %</label>
                                <input type="number" id="relevanceWeight" required min="0" max="100" value="35" oninput="validateWeights()">
                            </div>
                            <div class="weight-input">
                                <label>Detail %</label>
                                <input type="number" id="detailWeight" required min="0" max="100" value="25" oninput="validateWeights()">
                            </div>
                        </div>
                        <p id="weightTotal" style="color: #4caf50; font-size: 12px; margin-top: 5px;">Total: 100%</p>
                    </div>

                    <div class="form-group">
                        <label>Challenge Image</label>
                        <input type="file" id="challengeImage" accept="image/*" required onchange="previewChallengeImage(event)">
                        <div id="challengeImagePreview" class="image-preview"></div>
                    </div>

                    <button type="submit" class="btn-primary btn-large">Create Challenge</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../scripts/api-service.js"></script>
    <script src="../scripts/realtime-service.js"></script>
    <script src="../scripts/challenges.js"></script>
</body>
</html>
