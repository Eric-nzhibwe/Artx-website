<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges — ARTX</title>
    <link rel="icon" type="image/jpeg" href="../Images/ARTX.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/challenges.css?v=2">
</head>
<body>
<div class="container">

    <!-- Header -->
    <header class="header">
        <div class="logo" onclick="window.location.href='../index.html'">
            <i class="fas fa-fire"></i> ARTX
        </div>
        <button class="mobile-menu-toggle" onclick="toggleMobileMenu()" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
        <nav class="nav" id="mainNav">
            <button class="nav-btn" onclick="window.location.href='../index.html'">Dashboard</button>
            <button class="nav-btn active">Challenges</button>
            <button class="nav-btn" onclick="window.location.href='community.html'">Community</button>
            <button class="nav-btn" onclick="window.location.href='influencers.html'">Influencers</button>
            <button class="nav-btn" onclick="showUploadModal()"><i class="fas fa-plus"></i> Create</button>
        </nav>
        <div class="user-menu-dropdown">
            <button class="btn-user-menu" onclick="toggleUserMenu()" aria-label="User menu">
                <i class="fas fa-user-circle"></i>
                <i class="fas fa-chevron-down" style="font-size:11px;"></i>
            </button>
            <div class="dropdown-content" id="userDropdown">
                <a href="wallet.html"><i class="fas fa-wallet"></i> My Wallet</a>
                <a href="chatbot.html"><i class="fas fa-robot"></i> AI Assistant</a>
                <a href="#" onclick="openMessenger(); return false;">
                    <i class="fas fa-comments"></i> Messenger
                    <span class="unread-badge" id="unreadBadge" style="display:none;">0</span>
                </a>
                <a href="user.html"><i class="fas fa-user"></i> User Profile</a>
                <div class="user-info">
                    <div class="wallet-balance-badge" id="walletBalanceBadge"
                         onclick="window.location.href='wallet.html'" style="cursor:pointer;display:none;">
                        <i class="fas fa-wallet"></i><span id="walletBalance">K0.00</span>
                    </div>
                    <div class="streak-badge" id="streakBadge">
                        <i class="fas fa-fire"></i><span id="streakCount">0</span>
                    </div>
                    <span class="prestige-badge" id="userPrestige">0 pts</span>
                    <div class="tier-badge" id="tierBadge">Bronze</div>
                    <span class="username" id="username">Player</span>
                </div>
                <a href="#" onclick="logout(); return false;" style="color:#f44336;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </header>

    <!-- Challenges Grid -->
    <section class="challenges-section">
        <div class="section-header">
            <h1><i class="fas fa-trophy"></i> Active Challenges</h1>
            <div class="filters" role="group" aria-label="Filter by difficulty">
                <button class="filter-btn active" onclick="filterChallenges('all', event)">All</button>
                <button class="filter-btn" onclick="filterChallenges('easy', event)">Easy</button>
                <button class="filter-btn" onclick="filterChallenges('medium', event)">Medium</button>
                <button class="filter-btn" onclick="filterChallenges('hard', event)">Hard</button>
                <button class="filter-btn" onclick="filterChallenges('expert', event)">Expert</button>
            </div>
        </div>
        <div class="challenges-grid" id="challengesGrid" role="list"></div>
    </section>

    <!-- My Submissions -->
    <section class="my-submissions">
        <h2><i class="fas fa-history"></i> My Submissions</h2>
        <div class="submissions-list" id="mySubmissionsList"></div>
    </section>

</div>

<!-- Challenge Modal -->
<div id="challengeModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content large">
        <button class="modal-close-btn" onclick="closeChallengeModal()" aria-label="Close">&times;</button>
        <div id="challengeContent"></div>
    </div>
</div>

<!-- Upload / Create Modal -->
<div id="uploadModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
        <button class="modal-close-btn" onclick="closeUploadModal()" aria-label="Close">&times;</button>
        <h2 style="margin-bottom:20px;font-size:20px;">
            <i class="fas fa-upload" style="color:var(--accent-green);margin-right:8px;"></i> Create
        </h2>

        <div class="upload-tabs">
            <button class="tab-btn active" onclick="switchUploadTab('content')">Upload Content</button>
            <button class="tab-btn" onclick="switchUploadTab('challenge')">Create Challenge</button>
        </div>

        <!-- Upload Content Tab -->
        <div id="contentTab" class="tab-content active">
            <form id="uploadForm" onsubmit="uploadContent(event)" novalidate>
                <div class="form-group">
                    <label for="uploadTitle">Title</label>
                    <input type="text" id="uploadTitle" required placeholder="Give your content a title">
                </div>
                <div class="form-group">
                    <label for="uploadDescription">Description</label>
                    <textarea id="uploadDescription" required rows="3" placeholder="Describe your creation..."></textarea>
                </div>
                <div class="form-group">
                    <label for="uploadCategory">Category</label>
                    <select id="uploadCategory" required>
                        <option value="art">Art</option>
                        <option value="photography">Photography</option>
                        <option value="digital">Digital Art</option>
                        <option value="abstract">Abstract</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="uploadImage">Image</label>
                    <input type="file" id="uploadImage" accept="image/*" required onchange="previewUploadImage(event)">
                    <div id="uploadPreview" class="image-preview">
                        <span><i class="fas fa-image"></i> Preview will appear here</span>
                    </div>
                </div>
                <button type="submit" class="btn-primary btn-large">
                    <i class="fas fa-paper-plane"></i> Submit for Review
                </button>
            </form>
        </div>

        <!-- Create Challenge Tab -->
        <div id="challengeTab" class="tab-content">
            <form id="createChallengeForm" onsubmit="createChallenge(event)" novalidate>
                <div class="form-group">
                    <label for="challengeTitle">Challenge Title</label>
                    <input type="text" id="challengeTitle" required placeholder="e.g., The Forgotten Garden">
                </div>
                <div class="form-group">
                    <label for="challengeDescription">Description</label>
                    <textarea id="challengeDescription" required rows="3" placeholder="Describe what participants should interpret..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="challengeDifficulty">Difficulty</label>
                        <select id="challengeDifficulty" required>
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                            <option value="expert">Expert</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="challengeTimeLimit">Time Limit (minutes)</label>
                        <input type="number" id="challengeTimeLimit" required min="5" max="120" value="20">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="challengeMinWords">Min Words</label>
                        <input type="number" id="challengeMinWords" required min="10" value="50">
                    </div>
                    <div class="form-group">
                        <label for="challengeMaxWords">Max Words</label>
                        <input type="number" id="challengeMaxWords" required min="50" value="200">
                    </div>
                </div>
                <div class="form-group">
                    <label for="challengeRules">Submission Rules <small style="color:var(--text-muted);text-transform:none;">(one per line)</small></label>
                    <textarea id="challengeRules" required rows="4" placeholder="Rule 1&#10;Rule 2&#10;Rule 3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="challengeMinPoints">Min Points</label>
                        <input type="number" id="challengeMinPoints" required min="5" value="10">
                    </div>
                    <div class="form-group">
                        <label for="challengeMaxPoints">Max Points</label>
                        <input type="number" id="challengeMaxPoints" required min="10" value="50">
                    </div>
                </div>
                <div class="form-group">
                    <label>Scoring Weights <small style="color:var(--text-muted);text-transform:none;">(must sum to 100%)</small></label>
                    <div class="scoring-weights">
                        <div class="weight-input">
                            <label for="creativityWeight">Creativity %</label>
                            <input type="number" id="creativityWeight" required min="0" max="100" value="40" oninput="validateWeights()">
                        </div>
                        <div class="weight-input">
                            <label for="relevanceWeight">Relevance %</label>
                            <input type="number" id="relevanceWeight" required min="0" max="100" value="35" oninput="validateWeights()">
                        </div>
                        <div class="weight-input">
                            <label for="detailWeight">Detail %</label>
                            <input type="number" id="detailWeight" required min="0" max="100" value="25" oninput="validateWeights()">
                        </div>
                    </div>
                    <p id="weightTotal" style="color:var(--accent-green);font-size:13px;margin-top:6px;font-weight:600;">Total: 100% ✓</p>
                </div>
                <div class="form-group">
                    <label for="challengeImage">Challenge Image</label>
                    <input type="file" id="challengeImage" accept="image/*" required onchange="previewChallengeImage(event)">
                    <div id="challengeImagePreview" class="image-preview">
                        <span><i class="fas fa-image"></i> Preview will appear here</span>
                    </div>
                </div>
                <button type="submit" class="btn-primary btn-large">
                    <i class="fas fa-bolt"></i> Create Challenge
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="../scripts/api-service.js"></script>
<script src="../scripts/realtime-service.js"></script>
<script src="../scripts/challenges.js"></script>
</body>
</html>
