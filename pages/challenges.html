<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges</title>
    <link rel="icon" type="image/jpeg" href="../Images/ARTX.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/challenges.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo" onclick="window.location.href='../index.html'"><i class="fas fa-fire"></i>ARTX</div>
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <nav class="nav" id="mainNav">
                <button class="nav-btn" onclick="window.location.href='../index.html'">Dashboard</button>
                <button class="nav-btn active">Challenges</button>
                <button class="nav-btn" onclick="window.location.href='community.html'">Community</button>
                <button class="nav-btn" onclick="window.location.href='influencers.html'">Influencers</button>
                <button class="nav-btn" onclick="showUploadModal()">Upload</button>
            </nav>
            <!-- User Menu Dropdown -->
                <div class="user-menu-dropdown">
                    <button class="btn-user-menu" onclick="toggleUserMenu()">
                        <i class="fas fa-user-circle"></i>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-content" id="userDropdown">
                        <a href="wallet.html">
                            <i class="fas fa-wallet"></i> My Wallet
                        </a>
                        <a href="chatbot.html">
                            <i class="fas fa-robot"></i> AI Assistant
                        </a>
                        <a href="#" onclick="openMessenger(); return false;">
                            <i class="fas fa-comments"></i> Messenger
                            <span class="unread-badge" id="unreadBadge" style="display: none;">0</span>
                        </a>
                        <a href="user.html">
                            <i class="fas fa-user"></i> User Profile
                        </a>
                        <div class="user-info">
                <div class="wallet-balance-badge" id="walletBalanceBadge" onclick="window.location.href='wallet.html'" style="cursor: pointer; display: none;">
                    <i class="fas fa-wallet"></i>
                    <span id="walletBalance">K0.00</span>
                </div>
                <div class="streak-badge" id="streakBadge">
                    <span class="streak-icon"><i class="fas fa-fire"></i></span>
                    <span id="streakCount">0</span>
                </div>
                <span class="prestige-badge" id="userPrestige">0</span>
                <div class="tier-badge" id="tierBadge">Bronze</div>
                <span class="username" id="username">Player</span>
            
                        <a href="#" onclick="logout(); return false;">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Challenges Grid -->
        <section class="challenges-section">
            <div class="section-header">
                <h1><i class="fas fa-trophy"></i> Active Challenges</h1>
                <div class="filters">
                    <button class="filter-btn active" onclick="filterChallenges('all')">All</button>
                    <button class="filter-btn" onclick="filterChallenges('easy')">Easy</button>
                    <button class="filter-btn" onclick="filterChallenges('medium')">Medium</button>
                    <button class="filter-btn" onclick="filterChallenges('hard')">Hard</button>
                    <button class="filter-btn" onclick="filterChallenges('expert')">Expert</button>
                </div>
            </div>

            <div class="challenges-grid" id="challengesGrid"></div>
        </section>

        <!-- My Submissions -->
        <section class="my-submissions">
            <h2><i class="fas fa-history"></i> My Submissions</h2>
            <div class="submissions-list" id="mySubmissionsList"></div>
        </section>
    </div>

    <!-- Challenge Modal -->
    <div id="challengeModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeChallengeModal()">&times;</span>
            <div id="challengeContent"></div>
        </div>
    </div>

    <!-- Upload Content Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUploadModal()">&times;</span>
            <h2><i class="fas fa-upload"></i> Create Challenge</h2>
            
            <div class="upload-tabs">
                <button class="tab-btn active" onclick="switchUploadTab('content')">Upload Content</button>
                <button class="tab-btn" onclick="switchUploadTab('challenge')">Create Challenge</button>
            </div>
            
            <!-- Upload Content Tab -->
            <div id="contentTab" class="tab-content active">
                <form id="uploadForm" onsubmit="uploadContent(event)">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="uploadTitle" required placeholder="Give your content a title">
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="uploadDescription" required rows="3" placeholder="Describe your creation..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select id="uploadCategory" required>
                            <option value="art">Art</option>
                            <option value="photography">Photography</option>
                            <option value="digital">Digital Art</option>
                            <option value="abstract">Abstract</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Upload Image</label>
                        <input type="file" id="uploadImage" accept="image/*" required onchange="previewUploadImage(event)">
                        <div id="uploadPreview" class="image-preview"></div>
                    </div>

                    <button type="submit" class="btn-primary btn-large">Submit for Review</button>
                </form>
            </div>
            
            <!-- Create Challenge Tab -->
            <div id="challengeTab" class="tab-content">
                <form id="createChallengeForm" onsubmit="createChallenge(event)">
                    <div class="form-group">
                        <label>Challenge Title</label>
                        <input type="text" id="challengeTitle" required placeholder="e.g., The Forgotten Garden">
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="challengeDescription" required rows="3" placeholder="Describe what participants should interpret..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Difficulty</label>
                            <select id="challengeDifficulty" required>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                                <option value="expert">Expert</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Time Limit (minutes)</label>
                            <input type="number" id="challengeTimeLimit" required min="5" max="120" value="20">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Min Word Count</label>
                            <input type="number" id="challengeMinWords" required min="10" value="50">
                        </div>
                        <div class="form-group">
                            <label>Max Word Count</label>
                            <input type="number" id="challengeMaxWords" required min="50" value="200">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Submission Rules (one per line)</label>
                        <textarea id="challengeRules" required rows="4" placeholder="Rule 1&#10;Rule 2&#10;Rule 3"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Min Points</label>
                            <input type="number" id="challengeMinPoints" required min="5" value="10">
                        </div>
                        <div class="form-group">
                            <label>Max Points</label>
                            <input type="number" id="challengeMaxPoints" required min="10" value="50">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Scoring Weights (must sum to 100%)</label>
                        <div class="scoring-weights">
                            <div class="weight-input">
                                <label>Creativity %</label>
                                <input type="number" id="creativityWeight" required min="0" max="100" value="40" oninput="validateWeights()">
                            </div>
                            <div class="weight-input">
                                <label>Relevance %</label>
                                <input type="number" id="relevanceWeight" required min="0" max="100" value="35" oninput="validateWeights()">
                            </div>
                            <div class="weight-input">
                                <label>Detail %</label>
                                <input type="number" id="detailWeight" required min="0" max="100" value="25" oninput="validateWeights()">
                            </div>
                        </div>
                        <p id="weightTotal" style="color: #4caf50; font-size: 12px; margin-top: 5px;">Total: 100%</p>
                    </div>

                    <div class="form-group">
                        <label>Challenge Image</label>
                        <input type="file" id="challengeImage" accept="image/*" required onchange="previewChallengeImage(event)">
                        <div id="challengeImagePreview" class="image-preview"></div>
                    </div>

                    <button type="submit" class="btn-primary btn-large">Create Challenge</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../scripts/api-service.js"></script>
    <script src="../scripts/realtime-service.js"></script>
    <script src="../scripts/challenges.js"></script>
</body>
</html>
