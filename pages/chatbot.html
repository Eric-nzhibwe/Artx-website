<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTX AI Assistant</title>
    <link rel="icon" type="image/jpeg" href="../images/ARTX.jpg">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/chatbot.css">
    <link rel="stylesheet" href="../styles/responsive-pro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="chat-page">

    <!-- ── HEADER ── -->
    <header class="chat-header">
        <button class="chat-nav-btn" onclick="window.location.href='../index.html'" title="Back">
            <i class="fas fa-arrow-left"></i>
        </button>

        <div class="chat-header-identity">
            <div class="chat-ai-orb">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <div class="chat-header-name">ARTX AI</div>
                <div class="chat-header-status" id="aiStatusBadge">
                    <span class="status-dot"></span>
                    <span id="aiStatusLabel">Connecting…</span>
                </div>
            </div>
        </div>

        <button class="chat-nav-btn" onclick="clearConversation()" title="New chat">
            <i class="fas fa-pen-to-square"></i>
        </button>
    </header>

    <!-- ── MESSAGES ── -->
    <main class="chat-messages" id="chatMessages">

        <!-- Welcome card (hidden once chat starts) -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-orb">
                <i class="fas fa-robot"></i>
            </div>
            <h2>ARTX AI Assistant</h2>
            <p>Powered by Groq. Ask me anything about the platform — or anything at all.</p>

            <div class="starter-grid">
                <button class="starter-card" onclick="sendQuickMessage('How do I deposit funds into my wallet?')">
                    <i class="fas fa-wallet"></i>
                    <span>Deposit funds</span>
                </button>
                <button class="starter-card" onclick="sendQuickMessage('How do I earn money on ARTX?')">
                    <i class="fas fa-coins"></i>
                    <span>Earn money</span>
                </button>
                <button class="starter-card" onclick="sendQuickMessage('How do tournaments work?')">
                    <i class="fas fa-trophy"></i>
                    <span>Tournaments</span>
                </button>
                <button class="starter-card" onclick="sendQuickMessage('Explain the prestige tier system')">
                    <i class="fas fa-star"></i>
                    <span>Prestige tiers</span>
                </button>
                <button class="starter-card" onclick="sendQuickMessage('What payment methods does ARTX support?')">
                    <i class="fas fa-credit-card"></i>
                    <span>Payments</span>
                </button>
                <button class="starter-card" onclick="sendQuickMessage('How do alliances work?')">
                    <i class="fas fa-users"></i>
                    <span>Alliances</span>
                </button>
            </div>
        </div>

    </main>

    <!-- ── TYPING INDICATOR ── -->
    <div class="chat-typing" id="typingIndicator" style="display:none">
        <div class="typing-bubble">
            <span></span><span></span><span></span>
        </div>
        <span class="typing-label">ARTX AI is thinking…</span>
    </div>

    <!-- ── INPUT BAR ── -->
    <footer class="chat-input-bar">
        <form id="chatForm" onsubmit="sendMessage(event)">
            <div class="chat-input-wrap" id="inputWrap">
                <textarea
                    id="messageInput"
                    placeholder="Message ARTX AI…"
                    rows="1"
                    maxlength="1000"
                    aria-label="Message input"
                ></textarea>
                <button type="submit" class="chat-send-btn" id="sendBtn" disabled title="Send">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
            <p class="chat-disclaimer">ARTX AI can make mistakes. Verify important info.</p>
        </form>
    </footer>

</div>

<!-- ── MOBILE BOTTOM NAV ── -->
<nav class="mobile-bottom-nav" id="mobileBottomNav">
    <button class="icon-nav-btn" title="Home" onclick="window.location.href='../index.html'">
        <i class="fas fa-home"></i>
    </button>
    <button class="icon-nav-btn" title="Challenges" onclick="window.location.href='challenges.html'">
        <i class="fas fa-trophy"></i>
    </button>
    <button class="icon-nav-btn" title="Marketplace" onclick="window.location.href='../index.html'">
        <i class="fas fa-store"></i>
    </button>
    <button class="icon-nav-btn" title="People" onclick="window.location.href='community.html'">
        <i class="fas fa-users"></i>
    </button>
    <button class="icon-nav-btn active" onclick="toggleMobileMoreMenu(this)" title="More">
        <i class="fas fa-bars"></i>
    </button>
</nav>

<script src="../scripts/chatbot.js"></script>
<script>
function toggleMobileMoreMenu(btn) {
    const dropdown = document.getElementById('userMenuDropdown');
    if (!dropdown) return;
    const isOpen = dropdown.classList.contains('show');
    if (isOpen) {
        dropdown.classList.remove('show');
        ['top','bottom','right','position'].forEach(p => dropdown.style.removeProperty(p));
    } else {
        const navH = document.getElementById('mobileBottomNav').offsetHeight;
        Object.assign(dropdown.style, { position:'fixed', bottom:(navH+8)+'px', top:'auto', right:'8px' });
        dropdown.classList.add('show');
    }
}
document.addEventListener('click', e => {
    const dropdown = document.getElementById('userMenuDropdown');
    if (dropdown?.classList.contains('show') && dropdown.style.bottom) {
        const btn = document.querySelector('.mobile-bottom-nav .icon-nav-btn[title="More"]');
        if (!dropdown.contains(e.target) && !btn?.contains(e.target)) {
            dropdown.classList.remove('show');
            ['top','bottom','right','position'].forEach(p => dropdown.style.removeProperty(p));
        }
    }
});
</script>
</body>
</html>
