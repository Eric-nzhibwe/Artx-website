<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Hub</title>
    <link rel="icon" type="image/jpeg" href="../Images/ARTX.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/influencers.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo" onclick="window.location.href='../index.html'"><i class="fas fa-fire"></i>ARTX</div>
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <nav class="nav" id="mainNav">
                <button class="nav-btn" onclick="window.location.href='../index.html'">Dashboard</button>
                <button class="nav-btn" onclick="window.location.href='challenges.html'">Challenges</button>
                <button class="nav-btn" onclick="window.location.href='community.html'">Community</button>
                <button class="nav-btn active">Influencers</button>
            </nav>
            <!-- User Menu Dropdown -->
                <div class="user-menu-dropdown">
                    <button class="btn-user-menu" onclick="toggleUserMenu()">
                        <i class="fas fa-user-circle"></i>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-content" id="userDropdown">
                        <a href="pages/wallet.html">
                            <i class="fas fa-wallet"></i> My Wallet
                        </a>
                        <a href="pages/chatbot.html">
                            <i class="fas fa-robot"></i> AI Assistant
                        </a>
                        <a href="#" onclick="openMessenger(); return false;">
                            <i class="fas fa-comments"></i> Messenger
                            <span class="unread-badge" id="unreadBadge" style="display: none;">0</span>
                        </a>
                        <a href="pages/user.html">
                            <i class="fas fa-user"></i> User Profile
                        </a>
                        <div class="user-info">
                <div class="wallet-balance-badge" id="walletBalanceBadge" onclick="window.location.href='pages/wallet.html'" style="cursor: pointer; display: none;">
                    <i class="fas fa-wallet"></i>
                    <span id="walletBalance">K0.00</span>
                </div>
                <div class="streak-badge" id="streakBadge">
                    <span class="streak-icon"><i class="fas fa-fire"></i></span>
                    <span id="streakCount">0</span>
                </div>
                <span class="prestige-badge" id="userPrestige">0</span>
                <div class="tier-badge" id="tierBadge">Bronze</div>
                <span class="username" id="username">Player</span>
            
                        <a href="#" onclick="logout(); return false;">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <h1><i class="fas fa-star"></i> Influencer Hub</h1>
            <p>Partner with content creators for exclusive challenges and rewards</p>
        </section>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('influencers')">
                <i class="fas fa-users"></i> Featured Influencers
            </button>
            <button class="tab-btn" onclick="switchTab('events')">
                <i class="fas fa-calendar"></i> Weekly Events
            </button>
            <button class="tab-btn" onclick="switchTab('special')">
                <i class="fas fa-bolt"></i> Special Challenges
            </button>
        </div>

        <!-- Featured Influencers Tab -->
        <section id="influencers" class="tab-content active">
            <div class="influencers-grid" id="influencersGrid"></div>
        </section>

        <!-- Weekly Events Tab -->
        <section id="events" class="tab-content">
            <div class="events-grid" id="eventsGrid"></div>
        </section>

        <!-- Special Challenges Tab -->
        <section id="special" class="tab-content">
            <div class="special-challenges-grid" id="specialChallengesGrid"></div>
        </section>
    </div>

    <!-- Influencer Detail Modal -->
    <div id="influencerModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeInfluencerModal()">&times;</span>
            <div id="influencerDetail"></div>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeEventModal()">&times;</span>
            <div id="eventDetail"></div>
        </div>
    </div>

    <script src="../scripts/influencers.js"></script>
</body>
</html>
