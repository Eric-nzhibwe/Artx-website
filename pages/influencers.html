<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Hub</title>
    <link rel="icon" type="image/jpeg" href="../Images/ARTX.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/icon-nav.css">
    <link rel="stylesheet" href="../styles/influencers.css">
    <link rel="stylesheet" href="../styles/responsive-pro.css">
</head>
<body>
    <!-- Header with Bootstrap (matches index.html) -->
    <header class="header w-100">
        <div class="header-left d-flex align-items-center">
            <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer">
                <i class="fas fa-fire"></i>ARTX
            </div>
            <div class="search-bar d-none d-md-flex align-items-center">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search ARTX..." id="headerSearch">
            </div>
        </div>

        <nav class="icon-nav d-flex justify-content-center flex-grow-1">
            <button class="icon-nav-btn" title="Home" onclick="window.location.href='../index.html'">
                <i class="fas fa-home" style="color:black;"></i>
            </button>
            <button class="icon-nav-btn" title="Challenges" onclick="window.location.href='challenges.html'">
                <i class="fas fa-trophy" style="color:black;"></i>
            </button>
            <button class="icon-nav-btn" title="Community" onclick="window.location.href='community.html'">
                <i class="fas fa-users" style="color:black;"></i>
            </button>
            <button class="icon-nav-btn active" title="Influencers">
                <i class="fas fa-star" style="color:black;"></i>
            </button>
        </nav>

        <!-- Right Side Icons -->
        <div class="header-right d-flex align-items-center">
            <button class="header-icon-btn" onclick="window.location.href='../index.html'" title="Notifications">
                <i class="fas fa-bell" style="color:black;"></i>
            </button>
            <button class="header-icon-btn" onclick="toggleQuickMenu()" title="Menu">
                <i class="fas fa-th" style="color:black;"></i>
            </button>
            <div class="user-avatar-btn" onclick="toggleUserMenu()">
                <i class="fas fa-user-circle" style="color:black;"></i>
            </div>
        </div>

        <!-- Quick Menu Dropdown -->
        <div class="quick-menu-dropdown" id="quickMenuDropdown">
            <div class="quick-menu-header"><h3>Quick Access</h3></div>
            <div class="quick-menu-grid">
                <a href="../index.html" class="quick-menu-item">
                    <i class="fas fa-chart-line"></i><span>Dashboard</span>
                </a>
                <a href="challenges.html" class="quick-menu-item">
                    <i class="fas fa-trophy"></i><span>Challenges</span>
                </a>
                <a href="community.html" class="quick-menu-item">
                    <i class="fas fa-users"></i><span>Community</span>
                </a>
                <a href="wallet.html" class="quick-menu-item">
                    <i class="fas fa-wallet"></i><span>Wallet</span>
                </a>
                <a href="chatbot.html" class="quick-menu-item">
                    <i class="fas fa-robot"></i><span>AI Assistant</span>
                </a>
                <a href="influencers.html" class="quick-menu-item">
                    <i class="fas fa-star"></i><span>Influencers</span>
                </a>
            </div>
        </div>

        <!-- User Menu Dropdown -->
        <div class="user-menu-dropdown" id="userMenuDropdown">
            <div class="user-menu-header">
                <div class="user-menu-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="user-menu-info">
                    <h4 id="menuUsername">Player</h4>
                    <p id="menuTier">Bronze Tier</p>
                </div>
            </div>
            <div class="user-menu-stats">
                <div class="user-menu-stat">
                    <i class="fas fa-fire"></i>
                    <span id="menuStreak">0</span>
                </div>
                <div class="user-menu-stat">
                    <i class="fas fa-star"></i>
                    <span id="menuPrestige">0</span>
                </div>
                <div class="user-menu-stat">
                    <i class="fas fa-wallet"></i>
                    <span id="menuBalance">K0.00</span>
                </div>
            </div>
            <div class="user-menu-links">
                <a href="user.html">
                    <i class="fas fa-user"></i> View Profile
                </a>
                <a href="wallet.html">
                    <i class="fas fa-wallet"></i> My Wallet
                </a>
                <a href="#" onclick="window.location.href='../index.html'; return false;">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <a href="#" onclick="logout(); return false;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </header>

    <div class="container-fluid p-0 m-0">

        <!-- Hero Section -->
        <section class="hero">
            <h1><i class="fas fa-star"></i> Influencer Hub</h1>
            <p>Partner with content creators for exclusive challenges and rewards</p>
        </section>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('influencers')">
                <i class="fas fa-users"></i> Featured Influencers
            </button>
            <button class="tab-btn" onclick="switchTab('events')">
                <i class="fas fa-calendar"></i> Weekly Events
            </button>
            <button class="tab-btn" onclick="switchTab('special')">
                <i class="fas fa-bolt"></i> Special Challenges
            </button>
        </div>

        <!-- Featured Influencers Tab -->
        <section id="influencers" class="tab-content active">
            <div class="influencers-grid" id="influencersGrid"></div>
        </section>

        <!-- Weekly Events Tab -->
        <section id="events" class="tab-content">
            <div class="events-grid" id="eventsGrid"></div>
        </section>

        <!-- Special Challenges Tab -->
        <section id="special" class="tab-content">
            <div class="special-challenges-grid" id="specialChallengesGrid"></div>
        </section>
    </div>

    <!-- Mobile Bottom Navigation Bar (hidden on desktop via CSS) -->
    <nav class="mobile-bottom-nav" id="mobileBottomNav">
        <button class="icon-nav-btn" title="Home" onclick="window.location.href='../index.html'">
            <i class="fas fa-home"></i>
        </button>
        <button class="icon-nav-btn" title="Challenges" onclick="window.location.href='challenges.html'">
            <i class="fas fa-trophy"></i>
        </button>
        <button class="icon-nav-btn" title="Community" onclick="window.location.href='community.html'">
            <i class="fas fa-users"></i>
        </button>
        <button class="icon-nav-btn" title="Profile" onclick="window.location.href='user.html'">
            <i class="fas fa-user-circle"></i>
        </button>
        <button class="icon-nav-btn active" title="Influencers">
            <i class="fas fa-star"></i>
        </button>
    </nav>

    <script>
    // Mobile more menu toggle
    function toggleMobileMoreMenu(btn) {
        const dropdown = document.getElementById('userMenuDropdown');
        if (!dropdown) return;

        const isOpen = dropdown.classList.contains('show');

        if (isOpen) {
            dropdown.classList.remove('show');
            dropdown.style.removeProperty('top');
            dropdown.style.removeProperty('bottom');
            dropdown.style.removeProperty('right');
            dropdown.style.removeProperty('position');
        } else {
            // Position above the bottom nav
            const navH = document.getElementById('mobileBottomNav').offsetHeight;
            dropdown.style.position  = 'fixed';
            dropdown.style.bottom    = (navH + 8) + 'px';
            dropdown.style.top       = 'auto';
            dropdown.style.right     = '8px';
            dropdown.classList.add('show');
        }
    }

    // Close mobile more menu when clicking outside
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('userMenuDropdown');
        if (dropdown && dropdown.classList.contains('show') && dropdown.style.bottom) {
            const moreBtn = document.querySelector('.mobile-bottom-nav .icon-nav-btn[title="More"]');
            if (!dropdown.contains(e.target) && (!moreBtn || !moreBtn.contains(e.target))) {
                dropdown.classList.remove('show');
                dropdown.style.removeProperty('top');
                dropdown.style.removeProperty('bottom');
                dropdown.style.removeProperty('right');
                dropdown.style.removeProperty('position');
            }
        }
    });
    </script>

    <script src="../scripts/influencers.js"></script>
</body>
</html>
